<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background: radial-gradient(circle at top,#2b1650,#120b24);
        }

        .glass{
            background:#24143f;
            border:1px solid rgba(255,255,255,.08);
            box-shadow:
                0 0 40px rgba(126,52,255,.15),
                inset 0 0 0 1px rgba(255,255,255,.02);
        }

        .input{
            background:#1b1133;
            border:1px solid rgba(255,255,255,.08);
            transition:.2s;
        }

        .input:focus{
            outline:none;
            border-color:#8b5cf6;
            box-shadow:0 0 15px rgba(139,92,246,.35);
        }

        .active{
            background:linear-gradient(90deg,#7c3aed,#9146ff);
            box-shadow:0 0 20px rgba(139,92,246,.45);
        }

        .btn-main{
            background:linear-gradient(90deg,#7c3aed,#9d5cff);
            transition:.2s;
        }

        .btn-main:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(139,92,246,.4);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-5 text-white">

<div class="glass w-full max-w-md rounded-3xl p-7">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">
            Gerador<span class="text-violet-300"> de Login</span>
        </h1>

        <button class="w-11 h-11 rounded-full bg-violet-950 hover:bg-violet-800 transition">
            🌙
        </button>
    </div>

    <!-- Abas -->

    <div class="grid grid-cols-2 bg-[#1b1133] rounded-xl p-1 mb-6">

        <button class="active rounded-lg py-2 font-semibold">
            Gerador de Login
        </button>

        <button class="rounded-lg py-2 text-violet-300 hover:bg-violet-900 transition">
            Formatador de MAC
        </button>

    </div>

    <!-- Nome -->

    <label class="text-xs uppercase tracking-wider text-violet-300">
        Nome do Cliente
    </label>

    <input
        class="input w-full rounded-xl mt-2 mb-5 px-4 py-3"
        placeholder="Ex: João Silva"
    >

    <!-- Tipo -->

    <label class="text-xs uppercase tracking-wider text-violet-300">
        Tipo de Login
    </label>

    <div class="grid grid-cols-2 gap-3 mt-2 mb-5">

        <button class="active rounded-xl py-3 font-semibold">
            REDE NEUTRA
        </button>

        <button class="input rounded-xl py-3 font-semibold">
            PADRÃO / LOCAL
        </button>

    </div>

    <!-- Rede -->

    <label class="text-xs uppercase tracking-wider text-violet-300">
        Rede
    </label>

    <select class="input w-full rounded-xl mt-2 mb-5 px-4 py-3">
        <option>Selecione a rede</option>
        <option>Rede 1</option>
        <option>Rede 2</option>
    </select>

    <!-- Cidade -->

    <label class="text-xs uppercase tracking-wider text-violet-300">
        Cidade
    </label>

    <select class="input w-full rounded-xl mt-2 mb-7 px-4 py-3">
        <option>Selecione...</option>
        <option>Monte Carlo</option>
        <option>Campos Novos</option>
        <option>Fraiburgo</option>
    </select>

    <!-- Botão -->

    <button class="btn-main w-full rounded-xl py-4 text-lg font-bold">
        Gerar Acesso
    </button>

    <p class="text-center text-xs text-violet-400 mt-6">
        Desenvolvido por Alysson Cordeiro
    </p>

</div>

</body>
</html>
